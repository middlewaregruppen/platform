apiVersion: agent.fluxcd.controlplane.io/v1
kind: Catalog
spec:
  sources:
  - repository: ghcr.io/fluxcd/agent-skills
    tag: main
    targetAgents:
    - claude-code
    verify:
      matchOIDCIdentity:
      - issuer: https://token.actions.githubusercontent.com
        subject: ^https://github\.com/fluxcd/.*$
      provider: cosign
